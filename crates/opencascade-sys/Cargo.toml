[package]
name = "opencascade-sys"
description = "Rust bindings to the OpenCascade CAD Kernel (auto-generated)"
authors = ["Brian Schwind <brianmschwind@gmail.com>"]
license = "LGPL-2.1"
version = "0.2.0"
edition = "2021"
repository = "https://github.com/bschwind/opencascade-rs"

[dependencies]
cxx = "1"

[build-dependencies]
cmake = "0.1"
cxx-build = "1"
occt-sys = { path = "../occt-sys", optional = true }

[features]
default = ["builtin"]
builtin = ["occt-sys"]

[[example]]
name = "point_info_3d"
path = "examples/point_info_3d.rs"
