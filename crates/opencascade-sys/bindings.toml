# OCCT Binding Generator Configuration
#
# This file configures which OCCT headers are processed by the binding generator.
#
# - `modules`: Include ALL headers from these OCCT modules. Every header matching
#   "{Module}.hxx" and "{Module}_*.hxx" in the OCCT include directory is processed.
#
# - `exclude_headers`: Exclude specific headers, even if their module is listed above.
#
# - `include_headers`: Include specific individual headers from modules not listed
#   in `modules`. Use this for selective inclusion from large modules.

# Include ALL headers from these modules.
# Trimmed to only modules directly used by the opencascade crate.
# Transitive dependencies (Standard, NCollection, TCollection, TColStd,
# Precision, Adaptor2d, Geom2d, math, etc.) are auto-resolved via resolve_deps.
modules = [
    "Adaptor3d",           # 3D curve/surface adaptors (BRepAdaptor upcast target)
    "Bnd",                 # Bounding boxes
    "BRep",                # Boundary representation utilities
    "BRepAdaptor",         # BRep curve/surface adaptors
    "BRepAlgoAPI",         # Boolean operations
    "BRepBndLib",          # Bounding box utilities
    "BRepBuilderAPI",      # Shape construction
    "BRepFeat",            # Feature operations
    "BRepFilletAPI",       # Fillets and chamfers
    "BRepGProp",           # Global properties
    "BRepIntCurveSurface", # Intersection
    "BRepMesh",            # Meshing
    "BRepOffsetAPI",       # Offsets, sweeps, thick solids, lofts
    "BRepPrimAPI",         # Primitive shapes
    "BRepTools",           # Shape I/O and utilities
    "Extrema",             # Distance calculations
    "GC",                  # Geometry construction
    "GCPnts",              # Geometry points
    "Geom",                # 3D geometry
    "GeomAbs",             # Geometry enums
    "GeomAPI",             # Geometry utilities
    "gp",                  # Geometric primitives (Pnt, Vec, Dir, Trsf, etc.)
    "GProp",               # Global properties
    "IFSelect",            # Interface select enums
    "IGESControl",         # IGES I/O
    "Law",                 # Functions
    "Message",             # Progress reporting
    "Poly",                # Triangulation
    "ShapeAnalysis",       # Shape analysis tools
    "ShapeUpgrade",        # Shape healing
    "STEPControl",         # STEP I/O
    "StlAPI",              # STL I/O
    "TColgp",              # Collections of geometric primitives
    "TopAbs",              # Topology enums
    "TopExp",              # Topology exploration
    "TopLoc",              # Locations
    "TopoDS",              # Shape types
    "TopTools",            # Topology tools
]

# Exclude specific headers (even if their module is in `modules` above).
exclude_headers = [
    # Init method signature mismatch: subclass overrides Init() with different
    # signature, hiding parent version. Generator creates inherited_Init wrapper
    # that calls the parent signature which doesn't exist on the subclass.
    "ShapeUpgrade_ConvertCurve2dToBezier.hxx",
    "ShapeUpgrade_ConvertCurve3dToBezier.hxx",
    "ShapeUpgrade_SplitCurve2dContinuity.hxx",
    "ShapeUpgrade_SplitCurve3dContinuity.hxx",

    # i64 vs long type mismatch on arm64: Standard_Size maps to long but
    # generator emits i64 (long long).
    "Standard_ReadBuffer.hxx",

    # const char*& output parameter: generator converts const char* to rust::Str
    # but can't handle output reference parameters (&) to C strings.
    "Transfer_Finder.hxx",

    # Standard_CString (const char*) parameter passed by const ref: generator
    # converts to rust::Str but the C++ function expects const char* const&.
    "BRepFill_AdvancedEvolved.hxx",

    # Protected operator new/delete: class has protected allocation operators
    # (inherited from Message_ProgressScope), can't use std::make_unique.
    "Message_ProgressScope.hxx",
    "Message_ProgressSentry.hxx",
    "Message_LazyProgressScope.hxx",

    # No suitable operator delete for Poly_CoherentTriPtr.
    "Poly_CoherentTriPtr.hxx",

    # Deleted copy constructor: TopoDS_AlertAttribute can't be copy-constructed.
    "TopoDS_AlertAttribute.hxx",
]

# Include specific individual headers (from modules not fully included above).
include_headers = []

[general]
resolve_deps = true
