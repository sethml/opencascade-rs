# OCCT Binding Generator Configuration
#
# This file controls header selection and symbol-level binding exceptions.
#
# Main sections:
# - `modules`, `exclude_modules`, `include_headers`, `exclude_headers`: header selection
# - `exclude_methods`, `ambiguous_methods`, `non_allocatable_classes`: symbol/class filtering
# - `[occt_alias_type_overrides]`: canonical OCCT type spelling rewrites
# - `[manual_types]`: opaque manual types treated as known
# - `[template_instantiations]`: explicit template alias generation

# Include all OCCT modules by default, with exclusions below.
modules = ["*"]

# Exclude entire module categories that are not relevant to CAD modeling bindings.
exclude_modules = [
    # === Platform-specific GUI ===
    "Cocoa",               # macOS Cocoa bindings
    "WNT",                 # Windows native types
    "Wasm",                # WebAssembly bindings
    "Xw",                  # X Window system bindings

    # === EXPRESS schema parser (internal codegen tool, not user-facing) ===
    "Express",             # EXPRESS schema parser (String type conflicts with Rust String)

    # === Internal implementation details of OCCT's meshing subsystem ===
    "BRepMeshData",

    # === Precompiled header stubs (not real modules) ===
    "TKBRep",              # PCH stub
    "TKDEIGES",            # PCH stub
    "TKDESTEP",            # PCH stub
    "TKMath",              # PCH stub
    "TKMesh",              # PCH stub
    "TKV3d",               # PCH stub
    "TKXSBase",            # PCH stub
    "TKernel",             # PCH stub
]

# Exclude specific headers (even if their module is in `modules` above).
exclude_headers = [

    # Internal-only class: all constructors/destructors are private, accessible only
    # to friend classes TDF_Data and TDF_Label. No public API returns TDF_LabelNode*;
    # it's entirely hidden behind the TDF_Label value-type facade.
    "TDF_LabelNode.hxx",

    # Deprecated class: Message_ProgressScope should be used instead.
    "Message_ProgressSentry.hxx",

    # Deprecated class (OCCT 7.9): NCollection_Primes should be used instead.
    "TCollection.hxx",

    # Third-party dependency (rapidjson): these headers #include rapidjson which
    # is not bundled with our OCCT build.
    "RWGltf_GltfOStreamWriter.hxx",
    "RWGltf_GltfJsonParser.hxx",
    "RWGltf_CafWriter.hxx",
    "RWGltf_GltfAccessor.hxx",

    # Windows-only: includes <windows.h> which causes a fatal error on non-Windows
    # and corrupts clang's type resolution for subsequent headers.
    "OSD_WNT.hxx",

    # Packed color-component unions: clang exposes no fields, producing empty
    # opaque structs that trigger Rust FFI-safety warnings.
    "Image_Color.hxx",
]

# Include specific individual headers (from modules not fully included above).
include_headers = []

# Exclude specific methods/constructors that can't be bound. These methods are
# excluded individually so the rest of each class remains accessible.
# Format: "ClassName::MethodName" for methods, "ClassName::ClassName" for constructors.
exclude_methods = [
    # These take a const char *&, and advance the pointer after parsing.
    "XmlObjMgt::GetInteger",
    "XmlObjMgt::GetReal",
    "XmlObjMgt::GetReal",

    # Protected/hidden operator new — skip constructors but keep methods accessible.
    "Message_LazyProgressScope::Message_LazyProgressScope",
    "Poly_CoherentTriPtr::Poly_CoherentTriPtr",
]

# Methods that are known to trigger ambiguous overload errors in generated C++ wrappers.
# Format: "ClassName::MethodName".
ambiguous_methods = [
    "BOPAlgo_ParallelAlgo::Perform",
]

# Non-allocatable classes: suppress constructors and destructors (including
# CppDeletable/ToOwned) but keep the opaque struct and all methods.
# Use for classes with protected/hidden operator new/delete, forward-declared
# nested types, or typedefs that aren't real classes.
non_allocatable_classes = [
    "Message_ProgressScope::NullString",  # Forward-declared only, no full definition
    "Message_LazyProgressScope",           # Protected operator new/delete (protected inheritance)
    "Poly_CoherentTriPtr",                 # Hidden operator new/delete (DEFINE_NCOLLECTION_ALLOC)
]


# Canonical OCCT type spellings that should be rewritten to public typedef aliases.
# This is used when clang reports internal template names in canonical form.
[occt_alias_type_overrides]
"ShapePersistent_Geom::geometryBase<Geom_Curve>" = "ShapePersistent_Geom::Curve"
"ShapePersistent_Geom::geometryBase<Geom_Surface>" = "ShapePersistent_Geom::Surface"
"ShapePersistent_Geom::geometryBase<Geom2d_Curve>" = "ShapePersistent_Geom2d::Curve"

# Opaque types defined in manual/ files. These are not parsed from OCCT headers
# but referenced by auto-generated bindings. The generator adds them to the known
# class set so methods using them aren't skipped as "unknown type".
# Format: "CppTypeName" = { header = "Header.hxx" }
[manual_types]
Standard_OStream = { header = "Standard_OStream.hxx" }
Standard_IStream = { header = "Standard_IStream.hxx" }
Standard_SStream = { header = "Standard_SStream.hxx" }

# Platform-dependent pointer typedefs that should map to *mut std::ffi::c_void
# in the FFI layer. Clang canonicalizes these to platform-specific pointer types
# (e.g. NSOpenGLContext* on macOS, void* on Linux), producing inconsistent output.
# Intercepting by name before canonical resolution gives uniform cross-platform FFI.
# Methods using these types are marked unsafe.
void_pointer_types = ["Aspect_RenderingContext"]

# Template instantiation aliases: declare C++ template instantiations as opaque
# Rust types. The generator creates C++ typedefs, Rust opaque types, and Handle
# wrappers for each entry. The TOML key is the exact C++ template spelling as it
# appears in parsed method signatures.
# Format: "Template<Args>" = { header = "Header.hxx", module = "Module", handle = true }
[template_instantiations]
"BVH_Builder<double, 3>" = { header = "BVH_Builder.hxx", module = "BVH", handle = true }
"BVH_Tree<double, 3>" = { header = "BVH_Tree.hxx", module = "BVH", handle = true }
"NCollection_Shared<NCollection_List<gp_Pnt2d>>" = { header = "NCollection_Shared.hxx", module = "NCollection", handle = true }
"NCollection_Shared<TColStd_PackedMapOfInteger>" = { header = "NCollection_Shared.hxx", module = "NCollection", handle = true }
"NCollection_Shared<NCollection_DynamicArray<BRepMesh_Vertex>>" = { header = "NCollection_Shared.hxx", module = "NCollection", handle = true }
"NCollection_Shared<NCollection_IndexedMap<opencascade::handle<SelectMgr_EntityOwner>>>" = { header = "NCollection_Shared.hxx", module = "NCollection", handle = true }

# Split configuration for build parallelization.
# Splitting generated C++/Rust files enables parallel compilation.
[split]
# Strategy for C++ wrapper splitting: "toolkit" splits into one file per OCCT toolkit.
cpp_split = "toolkit"
# Strategy for Rust ffi.rs splitting: "toolkit" splits extern blocks into per-toolkit files.
ffi_split = "toolkit"
# Path to OCCT source directory containing TK*/PACKAGES files (relative to this file).
occt_source_dir = "../occt-sys/OCCT/src"